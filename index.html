<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercwar Gateway Hub</title>
    <style>
        /* Modern Industrial Dark Theme Design */
        :root {
            --bg-color: #070b10;
            --container-bg: #0d131a;
            --accent-cyan: #00f3ff;
            --border-color: #1a2636;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Centered Gateway Layout Container */
        .gateway-container {
            max-width: 1000px;
            width: 100%;
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 
                        0 0 30px rgba(0, 243, 255, 0.03);
            text-align: center;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        /* Subtle glow hover effect when tracking over the image asset area */
        .gateway-container:hover {
            border-color: rgba(0, 243, 255, 0.3);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 
                        0 0 40px rgba(0, 243, 255, 0.08);
        }

        /* Clickable Entry Link Anchor Box Styling */
        .gateway-link {
            display: block;
            width: 100%;
            text-decoration: none;
            border-radius: 8px;
            overflow: hidden;
            outline: none;
        }

        /* Banner Graphic Element Constraints */
        .gateway-banner {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 6px;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Micro-interaction zoom effect on hover */
        .gateway-link:hover .gateway-banner {
            transform: scale(1.01);
        }

        /* Footer System Metadata Badge */
        .gateway-footer {
            margin-top: 16px;
            font-size: 0.75rem;
            font-family: 'Courier New', Courier, monospace;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <!-- Central Interactive Gateway Frame -->
    <div class="gateway-container">
        
        <a target="_self" title="CLICK HERE to ENTER the GATEWAY FREE!" href="https://mercwar.github.io/Constellation/index.html" class="gateway-link">
            <img 
                src="https://raw.githubusercontent.com/mercwar/Robo-Knight-Gallery/refs/heads/main/Version%207/image_d2a07390.png" 
                alt="Mercwar Constellation" 
                class="gateway-banner"
            />
        </a>

        <!-- System Node Identifier Line -->
        <div class="gateway-footer">
            [ GATEWAY READY ]
        </div>

    </div>

</body>
</html>
