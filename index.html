<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Loading…</title>
  <style>
    body {
      background: #000;
      color: #0ff;
      font-family: monospace;
      text-align: center;
      padding-top: 20vh;
    }
  </style>
</head>
<body>

<h2>Loading Repository…</h2>

<script>
window.addEventListener("load", () => {
    const anchor = document.getElementById("jump_scroll");
    if (!anchor) return;

    anchor.scrollIntoView({
        behavior: "smooth",
        block: "start"
    });

    let lastPos = -1;
    let sameCount = 0;

    function trackScroll() {
        const currentPos = window.scrollY;

        if (currentPos === lastPos) {
            sameCount++;
            if (sameCount >= 3) {
                window.scrollBy({
                    top: 140,
                    behavior: "smooth"
                });
                return;
            }
        } else {
            sameCount = 0;
        }

        lastPos = currentPos;
        requestAnimationFrame(trackScroll);
    }

    requestAnimationFrame(trackScroll);
});
</script>

</body>
</html>
